<!DOCTYPE html>
<html lang="ja">

<head>

    <meta charset="UTF-8">

    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">

    <meta name="theme-color" content="#202020">

    <title>SHiCI</title>

    <link rel="manifest" href="manifest.json">

    <link rel="stylesheet" href="css/main.css">

</head>

<body>

    <!-- ==========================================
         Header
    =========================================== -->

    <header class="app-header">
        <div class="app-logo">SHiCI</div>
    </header>

    <!-- ==========================================
         Chat Area
    =========================================== -->

    <main id="chat" class="chat">

        <div class="message shici">こんにちは。何を調べますか？</div>

    </main>

    <!-- ==========================================
         Input Area
    =========================================== -->

    <form id="inputForm" class="input-area">

        <textarea id="query" rows="1" autocomplete="off" placeholder="SHiCIに質問する"></textarea>

        <button id="sendButton" type="submit">送信</button>

    </form>

    <!-- ==========================================
         JavaScript
    =========================================== -->

    <script src="js/SessionStore.js"></script>

    <script src="js/UIRenderer.js"></script>

    <script src="js/ApiClient.js"></script>

    <script src="js/TextareaController.js"></script>

    <script src="js/ChatController.js"></script>

    <script src="js/app.js"></script>

</body>

</html>
