<!DOCTYPE html>
<html lang="ja">

<head>

    <meta charset="UTF-8">

    <meta
        name="viewport"
        content="width=device-width, initial-scale=1.0, viewport-fit=cover"
    >

    <meta name="theme-color" content="#2563EB">

    <title>SHiCI</title>

    <link rel="manifest" href="manifest.json">

    <link rel="stylesheet" href="css/main.css">

</head>

<body>

    <!-- ==========================================
         Application
    =========================================== -->

    <div class="app">

        <!-- ======================================
             Header
        ======================================= -->

        <header class="app-header">

            <div class="app-brand">

                <div class="app-logo">

                    <span class="logo-text">
                        SHiCI
                    </span>

                    <span
                        id="logoAccent"
                        class="logo-accent"
                    ></span>

                </div>

            </div>

        </header>

        <!-- ======================================
             Chat Area
        ======================================= -->

        <main
            id="chat"
            class="chat"
            aria-live="polite"
        >

            <!--
                初期表示用のウェルカムエリアです。

                質問送信後は、JavaScript側から
                この要素を非表示にします。
            -->

            <section
                id="welcome"
                class="welcome"
            >

                <div class="welcome-symbol" aria-hidden="true">

                    <span class="welcome-hexagon welcome-hexagon-primary"></span>

                    <span class="welcome-hexagon welcome-hexagon-secondary"></span>

                </div>

                <div class="welcome-content">

                    <p class="welcome-greeting">
                        こんにちは。
                    </p>

                    <h1 class="welcome-title">
                        今日は何を調べますか？
                    </h1>

                    <p class="welcome-description">
                        SHiCIが知識をつなぎ、<br>
                        あなたの「知りたい」を探します。
                    </p>

                </div>

            </section>

        </main>

        <!-- ======================================
             Input Area
        ======================================= -->

        <form
            id="inputForm"
            class="input-area"
        >

            <div class="input-container">

                <textarea
                    id="query"
                    class="query-input"
                    rows="1"
                    autocomplete="off"
                    enterkeyhint="send"
                    aria-label="SHiCIへの質問"
                    placeholder="SHiCIに質問する"
                ></textarea>

                <button
                    id="sendButton"
                    class="send-button"
                    type="submit"
                    aria-label="質問を送信する"
                >

                    <span class="send-button-icon" aria-hidden="true">
                        ↑
                    </span>

                </button>

            </div>

        </form>

    </div>

    <!-- ==========================================
         JavaScript
    =========================================== -->

    <script src="js/SessionStore.js"></script>

    <script src="js/UIRenderer.js"></script>

    <script src="js/ApiClient.js"></script>

    <script src="js/TextareaController.js"></script>

    <script src="js/ChatController.js"></script>

    <script src="js/app.js"></script>

</body>

</html>
